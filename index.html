<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Accesos de Seguridad</title>

<style>
body{
    margin:0;
    font-family:Arial,Helvetica,sans-serif;
    background:#f4f6f8;
    display:flex;
    justify-content:center;
    align-items:center;
    min-height:100vh;
}

.contenedor{
    width:90%;
    max-width:420px;
    background:white;
    padding:30px;
    border-radius:15px;
    box-shadow:0 5px 20px rgba(0,0,0,.15);
    text-align:center;
}

h1{
    color:#0a5ca8;
    margin-bottom:10px;
}

p{
    color:#666;
    margin-bottom:25px;
}

.boton{
    display:block;
    text-decoration:none;
    color:white;
    background:#0a5ca8;
    padding:16px;
    margin:15px 0;
    border-radius:10px;
    font-size:18px;
    font-weight:bold;
    transition:.3s;
}

.boton:hover{
    background:#084a86;
}

.antito{background:#0066cc;}
.actsafe{background:#1e8e3e;}
.atento{background:#f57c00;}
</style>

</head>
<body>

<div class="contenedor">

<h1>Accesos</h1>

<p>Seleccione la aplicación que desea abrir.</p>

<a class="boton antito"
href="https://antito.asip.antamina.com/new?medium=qr">
Antito
</a>

<a class="boton actsafe"
href="https://qr2.mobi/27k6b">
ActSafe
</a>

<a class="boton atento"
href="https://www.atento24.com/">
Atento24
</a>

</div>

</body>
</html>
